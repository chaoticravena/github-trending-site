name: Update Trending Repos

on:
  schedule:
    - cron: '0 6 1,16 * *'   # dias 1 e 16 de cada mês, às 06:00 UTC
  workflow_dispatch:           # disparo manual

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Fetch trending repos (últimos 15 dias)
        run: node scripts/fetch_trending.js --days 15

      - name: Verificar se há mudanças
        id: changes
        run: |
          git diff --quiet && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit e push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/repos.json docs/data.js data/repos.json
          git commit -m "chore: atualiza repos trending [skip ci]"
          git push
