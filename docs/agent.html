<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agente de Recomendação AI - GitHub Trending</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';
        
        env.allowLocalModels = false;
        env.useBrowserCache = true;

        const DB_NAME = 'RepoEmbeddingsDB';
        const DB_VERSION = 1;
        const STORE_NAME = 'embeddings';
        const MODEL_NAME = 'Xenova/all-MiniLM-L6-v2';

        let extractor;
        let reposData = [];
        let isReady = false;

        // UI Elements
        const providerSelect = document.getElementById('provider-select');
        const apiKeyInput = document.getElementById('api-key');
        const queryInput = document.getElementById('query-input');
        const searchBtn = document.getElementById('search-btn');
        const statusMsg = document.getElementById('status-msg');
        const resultsContainer = document.getElementById('results-container');
        const loadingOverlay = document.getElementById('loading-overlay');

        // Configurações de Provedores
        const PROVIDERS = {
            anthropic: {
                name: 'Claude (Anthropic)',
                endpoint: 'https://api.anthropic.com/v1/messages',
                model: 'claude-3-7-sonnet-20250219',
                placeholder: 'sk-ant-...'
            },
            groq: {
                name: 'Groq (Super Fast)',
                endpoint: 'https://api.groq.com/openai/v1/chat/completions',
                model: 'llama-3.3-70b-versatile',
                placeholder: 'gsk_...'
            },
            gemini: {
                name: 'Google Gemini',
                endpoint: 'https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent',
                model: 'gemini-1.5-flash',
                placeholder: 'AIza...'
            },
            openrouter: {
                name: 'OpenRouter (Free Models)',
                endpoint: 'https://openrouter.ai/api/v1/chat/completions',
                model: 'google/gemini-2.0-flash-exp:free',
                placeholder: 'sk-or-...'
            }
        };

        // Initialize Session Storage
        providerSelect.addEventListener('change', () => {
            const p = providerSelect.value;
            apiKeyInput.placeholder = PROVIDERS[p].placeholder;
            apiKeyInput.value = sessionStorage.getItem(`api_key_${p}`) || '';
        });

        apiKeyInput.addEventListener('change', (e) => {
            sessionStorage.setItem(`api_key_${providerSelect.value}`, e.target.value);
        });

        // IndexedDB Helpers
        async function openDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) db.createObjectStore(STORE_NAME, { keyPath: 'url' });
                };
                request.onsuccess = (e) => resolve(e.target.result);
                request.onerror = (e) => reject(e.target.error);
            });
        }

        async function getStoredEmbeddings() {
            const db = await openDB();
            return new Promise((resolve, reject) => {
                const transaction = db.transaction(STORE_NAME, 'readonly');
                const store = transaction.objectStore(STORE_NAME);
                const request = store.getAll();
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        async function saveEmbeddings(embeddings) {
            const db = await openDB();
            return new Promise((resolve, reject) => {
                const transaction = db.transaction(STORE_NAME, 'readwrite');
                const store = transaction.objectStore(STORE_NAME);
                embeddings.forEach(item => store.put(item));
                transaction.oncomplete = () => resolve();
                transaction.onerror = () => reject(transaction.error);
            });
        }

        function dotProduct(a, b) { return a.reduce((sum, val, i) => sum + val * b[i], 0); }
        function cosineSimilarity(vecA, vecB) {
            const dot = dotProduct(vecA, vecB);
            const magA = Math.sqrt(dotProduct(vecA, vecA));
            const magB = Math.sqrt(dotProduct(vecB, vecB));
            return dot / (magA * magB);
        }

        async function init() {
            try {
                statusMsg.innerText = "Carregando modelo de IA local...";
                extractor = await pipeline('feature-extraction', MODEL_NAME);
                
                statusMsg.innerText = "Carregando base de dados...";
                let response;
                const paths = ['../data/repos_enriched.json', 'data/repos_enriched.json', './data/repos_enriched.json', '../data/repos.json'];
                for (const path of paths) {
                    try {
                        const res = await fetch(path);
                        if (res.ok && res.headers.get('content-type')?.includes('application/json')) {
                            response = res; break;
                        }
                    } catch (e) {}
                }

                if (!response) throw new Error("JSON não encontrado.");
                reposData = await response.json();

                const cached = await getStoredEmbeddings();
                const cachedMap = new Map(cached.map(c => [c.url, c.embedding]));
                const toEmbed = reposData.filter(r => !cachedMap.has(r.url));
                
                if (toEmbed.length > 0) {
                    statusMsg.innerText = `Processando ${toEmbed.length} novos repositórios...`;
                    const newEmbeddings = [];
                    for (let i = 0; i < toEmbed.length; i++) {
                        const repo = toEmbed[i];
                        const text = `${repo.name} ${repo.desc} ${repo.category || ''} ${repo.lang || ''}`;
                        const output = await extractor(text, { pooling: 'mean', normalize: true });
                        const embedding = Array.from(output.data);
                        newEmbeddings.push({ url: repo.url, embedding });
                        repo.embedding = embedding;
                        if (i % 20 === 0) statusMsg.innerText = `Indexando: ${i}/${toEmbed.length}`;
                    }
                    await saveEmbeddings(newEmbeddings);
                }

                reposData.forEach(repo => { if (!repo.embedding) repo.embedding = cachedMap.get(repo.url); });
                isReady = true;
                statusMsg.innerText = "Pronto para buscar!";
                statusMsg.classList.add('text-green-600');
                apiKeyInput.value = sessionStorage.getItem(`api_key_${providerSelect.value}`) || '';
            } catch (err) {
                statusMsg.innerText = "Erro: " + err.message;
                statusMsg.classList.add('text-red-600');
            }
        }

        async function githubSearch(query) {
            const res = await fetch(`https://api.github.com/search/repositories?q=${encodeURIComponent(query)}&per_page=5`);
            const data = await res.json();
            return (data.items || []).map(item => ({
                name: item.full_name, url: item.html_url, desc: item.description, lang: item.language, source: 'GitHub Search'
            }));
        }

        async function callLLM(provider, apiKey, system, messages, tools = null) {
            const config = PROVIDERS[provider];
            let body, headers = { 'Content-Type': 'application/json' };

            if (provider === 'anthropic') {
                headers['x-api-key'] = apiKey;
                headers['anthropic-version'] = '2023-06-01';
                headers['anthropic-dangerous-direct-browser-access'] = 'true';
                body = { model: config.model, max_tokens: 1500, system, messages, tools };
            } else if (provider === 'gemini') {
                const url = `${config.endpoint}?key=${apiKey}`;
                body = { contents: [{ parts: [{ text: `${system}\n\n${messages[messages.length-1].content}` }] }] };
                const res = await fetch(url, { method: 'POST', body: JSON.stringify(body) });
                const data = await res.json();
                return { content: [{ text: data.candidates[0].content.parts[0].text }] };
            } else {
                // Groq & OpenRouter (OpenAI format)
                headers['Authorization'] = `Bearer ${apiKey}`;
                body = { model: config.model, messages: [{ role: 'system', content: system }, ...messages] };
                const res = await fetch(config.endpoint, { method: 'POST', headers, body: JSON.stringify(body) });
                const data = await res.json();
                return { content: [{ text: data.choices[0].message.content }] };
            }

            const res = await fetch(config.endpoint, { method: 'POST', headers, body: JSON.stringify(body) });
            return await res.json();
        }

        async function runAgent(userQuery) {
            const provider = providerSelect.value;
            const apiKey = apiKeyInput.value;
            if (!apiKey) return alert("Insira a API Key.");

            loadingOverlay.classList.remove('hidden');
            resultsContainer.innerHTML = '';

            try {
                const queryEmbeddingOutput = await extractor(userQuery, { pooling: 'mean', normalize: true });
                const queryEmbedding = Array.from(queryEmbeddingOutput.data);

                const localResults = reposData
                    .map(repo => ({ ...repo, similarity: cosineSimilarity(queryEmbedding, repo.embedding), source: 'Local' }))
                    .sort((a, b) => b.similarity - a.similarity).slice(0, 8);

                const system = "Você é um agente especialista em recomendar repositórios do GitHub. Retorne uma lista ranqueada em formato JSON [ {name, url, desc, reason, source} ].";
                const userPrompt = `Usuário quer: "${userQuery}"\n\nLocais:\n${JSON.stringify(localResults.map(r => ({name: r.name, desc: r.desc})), null, 2)}`;
                
                const data = await callLLM(provider, apiKey, system, [{ role: 'user', content: userPrompt }]);
                
                const finalContent = data.content[0].text || data.content[0].text;
                const jsonMatch = finalContent.match(/\[[\s\S]*\]/);
                renderResults(jsonMatch ? JSON.parse(jsonMatch[0]) : []);
            } catch (err) {
                alert("Erro: " + err.message);
            } finally {
                loadingOverlay.classList.add('hidden');
            }
        }

        function renderResults(repos) {
            resultsContainer.innerHTML = repos.map(repo => `
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 hover:shadow-md transition-shadow">
                    <div class="flex justify-between items-start mb-2">
                        <h3 class="text-xl font-bold text-blue-600"><a href="${repo.url}" target="_blank" class="hover:underline">${repo.name}</a></h3>
                        <span class="px-2 py-1 text-xs font-semibold rounded ${repo.source === 'Local' ? 'bg-green-100 text-green-700' : 'bg-purple-100 text-purple-700'}">${repo.source}</span>
                    </div>
                    <p class="text-gray-600 mb-4 text-sm">${repo.desc || ''}</p>
                    <div class="bg-blue-50 p-3 rounded-lg border-l-4 border-blue-400 text-sm text-blue-800"><strong>Por que:</strong> ${repo.reason}</div>
                </div>
            `).join('');
        }

        searchBtn.addEventListener('click', () => { const q = queryInput.value.trim(); if (q && isReady) runAgent(q); });
        queryInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') searchBtn.click(); });
        init();
    </script>
</head>
<body class="bg-gray-50 min-h-screen font-sans text-gray-900">
    <div class="max-w-4xl mx-auto px-4 py-10">
        <header class="text-center mb-10">
            <h1 class="text-3xl font-black mb-2">Agente de Recomendação AI</h1>
            <p class="text-gray-500">Encontre ferramentas no seu banco local e no GitHub.</p>
        </header>

        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200 mb-8">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-xs font-bold uppercase text-gray-400 mb-1">Provedor de IA</label>
                    <select id="provider-select" class="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="anthropic">Claude (Anthropic)</option>
                        <option value="groq">Groq (Llama 3.3)</option>
                        <option value="gemini">Google Gemini 1.5</option>
                        <option value="openrouter">OpenRouter (Free Models)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase text-gray-400 mb-1">API Key</label>
                    <input type="password" id="api-key" placeholder="sk-ant-..." class="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
                </div>
            </div>
            <div class="flex gap-2">
                <input type="text" id="query-input" placeholder="O que você quer construir?" class="flex-1 px-5 py-3 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                <button id="search-btn" class="bg-blue-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-blue-700 transition-all">Buscar</button>
            </div>
            <p id="status-msg" class="mt-4 text-xs font-medium text-center text-gray-400 italic">Inicializando sistema...</p>
        </div>

        <div id="results-container" class="grid gap-4"></div>
    </div>

    <div id="loading-overlay" class="fixed inset-0 bg-white/80 backdrop-blur-sm flex items-center justify-center z-50 hidden">
        <div class="text-center">
            <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-600 mx-auto mb-4"></div>
            <p class="font-bold text-gray-800">Consultando IAs...</p>
        </div>
    </div>
</body>
</html>
